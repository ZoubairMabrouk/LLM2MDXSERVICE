version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: zoubairmabrouk/fastapi-ollama:${IMAGE_TAG:-latest}
    environment:
      - OL_BASE_URL=http://ollama:11434/v1
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: