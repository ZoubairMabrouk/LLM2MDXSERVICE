name: Build & Push Docker Compose

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4️⃣ Build images via Docker Compose
      - name: Build Docker Compose
        env:
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_BUILDKIT: "1"
        run: docker compose -f docker/docker-compose.yml build

      # 5️⃣ Push images to Docker Hub
      - name: Push Docker Compose
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: docker compose -f docker/docker-compose.yml push