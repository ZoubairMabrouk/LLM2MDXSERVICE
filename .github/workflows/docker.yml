name: Build & Push Docker Compose

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v3

      # 2️⃣ Installer Docker Buildx (pour multi-plateforme)
      - uses: docker/setup-buildx-action@v2

      # 3️⃣ Login Docker Hub (action officielle)
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      # 4️⃣ Build les images avec Docker Compose
      - name: Build Docker Compose
        run: docker compose -f docker/docker-compose.yml build

      # 5️⃣ Push les images Docker Compose
      - name: Push Docker Compose
        run: docker compose -f docker/docker-compose.yml push