name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r app/requirements.txt flake8 pytest httpx

      - name: Lint (flake8)
        run: flake8 app/ --max-line-length=120 --extend-ignore=E501

      - name: Smoke test (start API and hit /docs)
        working-directory: app
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          DEADLINE=$((SECONDS + 30))
          until curl -sf http://127.0.0.1:8000/docs > /dev/null; do
            if [ $SECONDS -ge $DEADLINE ]; then
              echo "Smoke test failed: /docs did not respond within 30s."
              kill $SERVER_PID 2>/dev/null
              exit 1
            fi
            sleep 1
          done

          echo "Smoke test OK: /docs responded"
          kill $SERVER_PID 2>/dev/null

  docker:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
