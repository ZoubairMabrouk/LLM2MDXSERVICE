# ============================================================
# CI/CD Pipeline — Chat Service (Python / LLM)
# Repository : https://github.com/ZoubairMabrouk/LLM2MDXSERVICE
# Trigger    : Push sur la branche main
# Version    : 1.0.0
# ============================================================

name: 💬 Chat Service — Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  SERVICE_NAME: chat-service
  DOCKER_IMAGE: chat-service
  COMPOSE_SERVICE: chat-service
  DEPLOY_PATH: /opt/microservices
  PYTHON_VERSION: '3.12'

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Lint & Tests Python
  # ─────────────────────────────────────────────
  code-quality:
    name: 🔍 Python Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout du code source
        uses: actions/checkout@v4

      - name: 🐍 Configuration Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov black isort

      - name: 🎨 Vérification du formatage (Black)
        run: black --check --diff .
        continue-on-error: true       # Warning uniquement pour le formatage

      - name: 📋 Tri des imports (isort)
        run: isort --check-only --diff .
        continue-on-error: true

      - name: 🔍 Analyse statique (Flake8)
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.git,__pycache__,migrations,venv \
            --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s'

      - name: 🧪 Exécution des tests avec couverture
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short \
            -v
        continue-on-error: false

  # ─────────────────────────────────────────────
  # JOB 2 : Build & Push Docker
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality
    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout du code source
        uses: actions/checkout@v4

      - name: 🏷️ Calcul de la version
        id: version
        run: |
          VERSION="$(date +'%Y.%m.%d')-${GITHUB_SHA::8}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 🔧 Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-

      - name: 🏗️ Build et Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            BUILD_VERSION=${{ steps.version.outputs.version }}

  # ─────────────────────────────────────────────
  # JOB 3 : Déploiement SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          key: ${{ secrets.VPS_SSH_KEY }}
          username: ${{ secrets.VPS_USER }}
          port: 22
          debug: true
          timeout: 180s
          command_timeout: 30m
          script: |
            set -e

            echo "Logging in to GHCR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image"
            docker pull ghcr.io/zoubairmabrouk/chat-service:latest

            echo "Stopping existing container if present"
            docker rm -f chat-service || true

            echo "Running latest container"
            docker run -d \
              --name chat-service \
              --restart unless-stopped \
              -p 8085:8000 \
              ghcr.io/zoubairmabrouk/chat-service:latest

            echo "Deployment completed successfully"
            docker ps --filter "name=chat-service"

  notify-success:
    name: 📬 Telegram — Succès
    runs-on: ubuntu-latest
    needs: [docker-build, deploy]
    if: success()
    steps:
      - name: ✅ Notification succès
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": \"✅ *Chat Service Déployé*\n\n💬 *Service* : Chat \\/LLM Service\n🏷️ *Version* : \`${{ needs.docker-build.outputs.image_version }}\`\n👤 *Auteur* : ${{ github.actor }}\n📝 *SHA* : \`${GITHUB_SHA::8}\`\n🔗 [Voir workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\"
            }"

  notify-failure:
    name: 📬 Telegram — Échec
    runs-on: ubuntu-latest
    needs: [code-quality, docker-build, deploy]
    if: failure()
    steps:
      - name: ❌ Notification échec
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": \"❌ *Chat Service — Échec Déploiement*\n\n👤 *Auteur* : ${{ github.actor }}\n📝 *SHA* : \`${GITHUB_SHA::8}\`\n🔗 [🔍 Voir logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\"
            }"